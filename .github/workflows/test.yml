name: Tests

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  quality-checks:
    name: Code Quality (Format & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  version-check:
    name: Version Alignment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Check all crate versions match workspace version
        run: |
          WORKSPACE_VERSION=$(grep -A 1 '\[workspace.package\]' Cargo.toml | grep 'version = ' | sed 's/.*version = "\(.*\)"/\1/')
          
          if [ -z "$WORKSPACE_VERSION" ]; then
            echo "❌ Could not find workspace.package.version in root Cargo.toml"
            exit 1
          fi
          
          echo "📦 Workspace version: $WORKSPACE_VERSION"
          MISMATCHES=0
          
          for crate_toml in crates/*/Cargo.toml; do
            CRATE_NAME=$(grep '^name = ' "$crate_toml" | head -1 | sed 's/.*name = "\(.*\)"/\1/')
            
            if grep -q '^version\.workspace = true' "$crate_toml"; then
              echo "✅ $CRATE_NAME: $WORKSPACE_VERSION (inherited)"
            else
              CRATE_VERSION=$(grep '^version = ' "$crate_toml" | head -1 | sed 's/.*version = "\(.*\)"/\1/')
              if [ -z "$CRATE_VERSION" ]; then
                echo "❌ $CRATE_NAME: No version found"
                MISMATCHES=$((MISMATCHES + 1))
              elif [ "$CRATE_VERSION" != "$WORKSPACE_VERSION" ]; then
                echo "❌ $CRATE_NAME: $CRATE_VERSION (expected: $WORKSPACE_VERSION)"
                MISMATCHES=$((MISMATCHES + 1))
              else
                echo "✅ $CRATE_NAME: $CRATE_VERSION"
              fi
            fi
          done
          
          for crate_toml in crates/*/Cargo.toml; do
            CRATE_NAME=$(grep '^name = ' "$crate_toml" | head -1 | sed 's/.*name = "\(.*\)"/\1/')
            while IFS= read -r line; do
              if echo "$line" | grep -q 'path ='; then
                DEP_VERSION=$(echo "$line" | sed -n 's/.*version = "\([^"]*\)".*/\1/p')
                DEP_NAME=$(echo "$line" | sed -n 's/\([a-z_-]*\) = {.*/\1/p')
                if [ -n "$DEP_VERSION" ] && [ "$DEP_VERSION" != "$WORKSPACE_VERSION" ]; then
                  echo "❌ $CRATE_NAME: dependency '$DEP_NAME' has version $DEP_VERSION (expected: $WORKSPACE_VERSION)"
                  MISMATCHES=$((MISMATCHES + 1))
                fi
              fi
            done < <(grep 'version = "' "$crate_toml" | grep 'path =' || true)
          done
          
          if [ $MISMATCHES -gt 0 ]; then
            echo "❌ $MISMATCHES crate(s) have mismatched versions!"
            exit 1
          fi
          echo "✅ All crate versions aligned"
  
  lockfile-check:
    name: Cargo.lock Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Validate lockfile
        run: |
          if [ ! -f "Cargo.lock" ]; then
            echo "❌ Cargo.lock is not committed!"
            exit 1
          fi
          cp Cargo.lock Cargo.lock.before
          cargo update --workspace --dry-run
          if ! diff Cargo.lock Cargo.lock.before > /dev/null 2>&1; then
            echo "❌ Cargo.lock is out of sync with Cargo.toml!"
            exit 1
          fi
          echo "✅ Cargo.lock is up-to-date"

  test:
    name: Test on ${{ matrix.os }} with Rust ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    needs: [quality-checks, version-check, lockfile-check]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: beta
          - os: ubuntu-latest
            rust: nightly
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-cargo-registry-
            ${{ runner.os }}-cargo-registry-
      
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      
      - name: Install Go (for backend tests)
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false
      
      - name: Install Node.js (for JS backend tests)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Build tests (release mode)
        shell: bash
        run: cargo test --release --all-features --no-run
      
      - name: Run tests
        shell: bash
        run: |
          export PATH="$PWD/target/release:$PATH"
          cargo nextest run --release --all-features \
            --profile ci \
            --failure-output immediate-final \
            --success-output never
      
      - name: Run doctests
        shell: bash
        run: cargo test --release --doc
      
      - name: Test examples (Unix)
        if: matrix.rust == 'stable' && runner.os != 'Windows'
        run: |
          ./target/release/wj build --target=rust examples/01_basics --output /tmp/test_01 || true
          ./target/release/wj build --target=rust examples/18_stdlib_math_test --output /tmp/test_math || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [quality-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Generate coverage
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml --run-types Lib
        timeout-minutes: 30
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  multi-target-tests:
    name: Multi-Target Compilation Tests
    runs-on: ubuntu-latest
    needs: [quality-checks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      
      - name: Build windjammer
        run: cargo build --release
      
      - name: Test Rust target
        run: |
          echo "fn main() { println!(\"Hello, Rust!\") }" > test.wj
          ./target/release/wj build --target=rust test.wj --output /tmp/test_rust
          test -f /tmp/test_rust/Cargo.toml || exit 1
      
      - name: Test JavaScript target
        run: |
          echo "fn main() { println!(\"Hello, JavaScript!\") }" > test.wj
          ./target/release/wj build --target=javascript test.wj --output /tmp/test_js
          test -f /tmp/test_js/output.js || exit 1
          node /tmp/test_js/output.js
      
      - name: Test WebAssembly target
        run: |
          echo "fn main() { println!(\"Hello, WASM!\") }" > test.wj
          ./target/release/wj build --target=wasm test.wj --output /tmp/test_wasm
          test -f /tmp/test_wasm/Cargo.toml || exit 1
      
      - name: Run multi-target integration tests
        run: cargo test --release --test multi_target_tests --verbose
      
      - name: Test complex code across targets
        run: |
          cat > complex.wj << 'EOF'
          struct Point {
              x: int,
              y: int,
          }
          
          fn add(a: int, b: int) -> int {
              a + b
          }
          
          fn main() {
              let p = Point { x: 10, y: 20 }
              let sum = add(p.x, p.y)
              println!("Sum: {}", sum)
          }
          EOF
          
          ./target/release/wj build --target=rust complex.wj --output /tmp/complex_rust
          ./target/release/wj build --target=javascript complex.wj --output /tmp/complex_js
          ./target/release/wj build --target=wasm complex.wj --output /tmp/complex_wasm

  docker-build:
    name: Test Docker Build
    runs-on: ubuntu-latest
    needs: [quality-checks]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker build
        run: docker build -t windjammer:test .

  publish-dryrun:
    name: Publish Dry-Run (Pre-merge Validation)
    runs-on: ubuntu-latest
    needs: [quality-checks, version-check, lockfile-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
            ${{ runner.os }}-cargo-registry-
      
      - name: Validate package structure
        run: |
          cargo package --list > /dev/null
          echo "✅ windjammer: package structure valid"
          cargo package --list -p windjammer-runtime > /dev/null
          echo "✅ windjammer-runtime: package structure valid"
