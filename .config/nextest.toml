[profile.default]
# Fail fast locally for quick iteration
fail-fast = true
# Reasonable timeout for individual tests
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# Don't fail fast in CI - run everything to see all failures
fail-fast = false
# Retry flaky tests once before declaring failure
retries = 1
# Longer timeout for CI (cold caches, slower machines)
slow-timeout = { period = "120s", terminate-after = 2 }
