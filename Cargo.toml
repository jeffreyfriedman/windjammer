[package]
name = "windjammer-app"
version = "0.1.0"
edition = "2021"

# Prevent this from being treated as part of parent workspace
[workspace]

[dependencies]
chrono = "0.4"
env_logger = "0.11"  # For logging during development
image = "0.24"  # For texture loading (PNG, JPG, BMP, etc.)
once_cell = "1.19"  # For Lazy statics in runtime
pollster = "0.3"  # For blocking on async operations
rapier3d = "0.17"  # Real physics simulation
rolt = "0.3.1"  # Safe Rust bindings to Jolt Physics - REAL IMPLEMENTATION!
smallvec = "1.13"
wgpu = "0.19"
winit = "0.29"
bytemuck = { version = "1.14", features = ["derive"] }  # For safe type casting
serde = { version = "1.0", features = ["derive"] }
windjammer-runtime = { path = "/Users/jeffreyfriedman/src/wj/windjammer/crates/windjammer-runtime" }

[[bin]]
name = "build"
path = "build.rs"

[profile.release]
opt-level = 3
